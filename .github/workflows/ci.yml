name: Cats vs Dogs MLOps CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install from requirements.txt to ensure all needed modules (like PyYAML) are present
          pip install -r requirements.txt
          # If TensorFlow is too heavy for CI, you could swap it for tensorflow-cpu here
          # but for a standard CNN, the requirements.txt is the safest source of truth.

      - name: Run unit tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m pytest tests/

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # Only push on main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python for build script
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Create valid dummy model for build
        run: |
          mkdir -p models
          pip install tensorflow-cpu
          # Create a real, minimal Keras model so load_model() doesn't crash
          python -c "import tensorflow as tf; m=tf.keras.Sequential([tf.keras.layers.Input(shape=(224,224,3)), tf.keras.layers.Flatten(), tf.keras.layers.Dense(1, activation='sigmoid')]); m.save('models/final_cnn_model.h5')"
          echo "✅ Minimal model created for build"

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ghcr.io/${{ github.repository }}
          # The action will lowercase the input automatically, 
          # but we ensure the base name is what we expect.
          tags: |
            type=sha
            type=ref,event=branch
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-and-smoke-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Pull and Run Container (Mock Deployment)
        run: |
          IMAGE_LOWER=$(echo "ghcr.io/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker run -d --name test_api -p 8000:8000 $IMAGE_LOWER:latest
          
          # Give TensorFlow enough time to load the model
          echo "Waiting for API to start..."
          sleep 20
          
          echo "--- Container Logs ---"
          docker logs test_api
          echo "----------------------"

      - name: Run Smoke Tests
        run: |
          python scripts/smoke_test.py
        env:
          BASE_URL: http://localhost:8000

      - name: Cleanup
        if: always()
        run: |
          echo "Dumping final logs before cleanup..."
          docker logs test_api || true
          docker rm -f test_api
      
      - name: 🚀 Deployment Update (Production Simulation)
        run: |
          echo "Triggering deployment update to Kubernetes/VM..."
          # Example for Kubernetes:
          # kubectl apply -f k8s/deployment.yaml
          # kubectl rollout restart deployment/cats-dogs-classifier

