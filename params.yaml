data:
  raw_dir: data/raw
  processed_dir: data/processed
  image_size: 224
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  batch_size: 32
  augmentation: true

model:
  architecture: cnn          # options: cnn, logistic
  num_classes: 2
  dropout_rate: 0.5
  dense_units: 128

training:
  epochs: 20
  learning_rate: 0.001
  optimizer: adam            # options: adam, sgd
  early_stopping_patience: 5
  seed: 42

mlflow:
  experiment_name: cats_vs_dogs_classification
  run_name: baseline_cnn
  tracking_uri: mlruns
