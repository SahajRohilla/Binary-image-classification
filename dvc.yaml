stages:
  preprocess:
    cmd: python src/data_preprocessing.py
    deps:
      - src/data_preprocessing.py
      - params.yaml
    params:
      - data.image_size
      - data.train_split
      - data.val_split
      - data.test_split
    outs:
      - data/processed:
          cache: true

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - src/model.py
      - data/processed
      - params.yaml
    params:
      - model.architecture
      - model.dropout_rate
      - model.dense_units
      - training.epochs
      - training.learning_rate
      - training.optimizer
      - training.early_stopping_patience
      - data.batch_size
      - data.augmentation
    outs:
      - models:
          cache: true
    metrics:
      - reports/metrics.json:
          cache: false

  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - models/final_cnn_model.h5
      - data/processed
    outs:
      - reports/eval_confusion_matrix.png:
          cache: false
      - reports/roc_curve.png:
          cache: false
